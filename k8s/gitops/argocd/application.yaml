apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pixelcore-root
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: pixelcore
  source:
    repoURL: https://github.com/toyball860721/pixelcore.git
    targetRevision: HEAD
    path: k8s/gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: pixelcore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pixelcore-api
  namespace: argocd
spec:
  project: pixelcore
  source:
    repoURL: https://github.com/toyball860721/pixelcore.git
    targetRevision: HEAD
    path: k8s/gitops/apps/pixelcore-api
    kustomize:
      namePrefix: pixelcore-
  destination:
    server: https://kubernetes.default.svc
    namespace: pixelcore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
