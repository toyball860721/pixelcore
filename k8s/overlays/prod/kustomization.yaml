apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pixelcore

namePrefix: prod-

commonLabels:
  environment: production

bases:
  - ../../base

patchesStrategicMerge:
  - replica-patch.yaml

configMapGenerator:
  - name: pixelcore-config
    behavior: merge
    literals:
      - APP_ENV=production
      - RUST_LOG=info

images:
  - name: ghcr.io/your-org/pixelcore/backend
    newTag: latest
  - name: ghcr.io/your-org/pixelcore/frontend
    newTag: latest
