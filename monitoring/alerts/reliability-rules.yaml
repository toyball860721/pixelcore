apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: reliability-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
spec:
  groups:
    - name: reliability
      interval: 30s
      rules:
        - alert: HighPodRestartRate
          expr: rate(kube_pod_container_status_restarts_total[1h]) > 5
          for: 5m
          labels:
            severity: warning
            category: reliability
          annotations:
            summary: "High pod restart rate detected"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last hour"

        - alert: PVCStorageAlmostFull
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
          for: 10m
          labels:
            severity: warning
            category: reliability
          annotations:
            summary: "PVC storage almost full"
            description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | humanizePercentage }} full"

        - alert: PVCStorageCritical
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.95
          for: 5m
          labels:
            severity: critical
            category: reliability
          annotations:
            summary: "PVC storage critically full"
            description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | humanizePercentage }} full - immediate action required"

        - alert: VeleroBackupFailure
          expr: velero_backup_failure_total > 0
          for: 1m
          labels:
            severity: critical
            category: reliability
          annotations:
            summary: "Velero backup failed"
            description: "Velero backup {{ $labels.schedule }} has failed. Check backup logs immediately."

        - alert: VeleroBackupMissing
          expr: time() - velero_backup_last_successful_timestamp > 3600
          for: 5m
          labels:
            severity: critical
            category: reliability
          annotations:
            summary: "Velero backup missing"
            description: "No successful Velero backup in the last hour. RPO target at risk."

        - alert: DatabaseReplicationLag
          expr: pg_replication_lag_seconds > 5
          for: 2m
          labels:
            severity: warning
            category: reliability
          annotations:
            summary: "PostgreSQL replication lag detected"
            description: "PostgreSQL replica {{ $labels.pod }} has replication lag of {{ $value }}s"

        - alert: DatabaseReplicationLagCritical
          expr: pg_replication_lag_seconds > 30
          for: 1m
          labels:
            severity: critical
            category: reliability
          annotations:
            summary: "PostgreSQL replication lag critical"
            description: "PostgreSQL replica {{ $labels.pod }} has critical replication lag of {{ $value }}s"

        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
          for: 5m
          labels:
            severity: critical
            category: reliability
          annotations:
            summary: "Pod is crash looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
            category: reliability
          annotations:
            summary: "Node not ready"
            description: "Node {{ $labels.node }} is not ready for {{ $value }}s"

        - alert: PodNotReady
          expr: kube_pod_status_phase{phase!="Running",phase!="Succeeded"} == 1
          for: 10m
          labels:
            severity: warning
            category: reliability
          annotations:
            summary: "Pod not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in {{ $labels.phase }} phase for more than 10 minutes"
