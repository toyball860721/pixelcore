apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: performance-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
spec:
  groups:
    - name: performance
      interval: 30s
      rules:
        - alert: HighAPILatency
          expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.1
          for: 5m
          labels:
            severity: warning
            category: performance
          annotations:
            summary: "High API latency detected"
            description: "P99 latency for {{ $labels.service }} is {{ $value }}s (threshold: 100ms)"

        - alert: CriticalAPILatency
          expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.5
          for: 2m
          labels:
            severity: critical
            category: performance
          annotations:
            summary: "Critical API latency detected"
            description: "P99 latency for {{ $labels.service }} is {{ $value }}s (threshold: 500ms)"

        - alert: HighMemoryUsage
          expr: |
            (
              container_memory_usage_bytes{container!=""}
              /
              container_spec_memory_limit_bytes{container!=""}
            ) > 0.9
          for: 5m
          labels:
            severity: warning
            category: performance
          annotations:
            summary: "High memory usage"
            description: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} is using {{ $value | humanizePercentage }} of memory limit"

        - alert: HighCPUUsage
          expr: |
            (
              rate(container_cpu_usage_seconds_total{container!=""}[5m])
              /
              container_spec_cpu_quota{container!=""} * 100000
            ) > 0.9
          for: 10m
          labels:
            severity: warning
            category: performance
          annotations:
            summary: "High CPU usage"
            description: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} is using {{ $value | humanizePercentage }} of CPU limit"

        - alert: DatabaseSlowQueries
          expr: rate(pg_stat_activity_max_tx_duration[5m]) > 10
          for: 5m
          labels:
            severity: warning
            category: performance
          annotations:
            summary: "Database slow queries detected"
            description: "PostgreSQL has slow queries taking more than 10 seconds"

        - alert: HighDatabaseConnections
          expr: |
            (
              pg_stat_database_numbackends
              /
              pg_settings_max_connections
            ) > 0.8
          for: 5m
          labels:
            severity: warning
            category: performance
          annotations:
            summary: "High database connection usage"
            description: "PostgreSQL is using {{ $value | humanizePercentage }} of max connections"

        - alert: RedisMemoryHigh
          expr: |
            (
              redis_memory_used_bytes
              /
              redis_memory_max_bytes
            ) > 0.9
          for: 5m
          labels:
            severity: warning
            category: performance
          annotations:
            summary: "Redis memory usage high"
            description: "Redis is using {{ $value | humanizePercentage }} of max memory"

        - alert: HighRequestRate
          expr: rate(http_requests_total[5m]) > 1000
          for: 5m
          labels:
            severity: info
            category: performance
          annotations:
            summary: "High request rate"
            description: "Service {{ $labels.service }} is receiving {{ $value }} requests/second"

        - alert: DiskIOHigh
          expr: rate(node_disk_io_time_seconds_total[5m]) > 0.9
          for: 10m
          labels:
            severity: warning
            category: performance
          annotations:
            summary: "High disk I/O"
            description: "Node {{ $labels.instance }} has high disk I/O utilization: {{ $value | humanizePercentage }}"

        - alert: NetworkThroughputHigh
          expr: |
            (
              rate(node_network_transmit_bytes_total[5m]) +
              rate(node_network_receive_bytes_total[5m])
            ) > 100000000
          for: 10m
          labels:
            severity: info
            category: performance
          annotations:
            summary: "High network throughput"
            description: "Node {{ $labels.instance }} has high network throughput: {{ $value | humanize }}B/s"
